<!DOCTYPE html>
<html lang="ko">
<head>
  {% include vscode/head.html %}
</head>
<body class="vscode-body">
  <script id="page-data" type="application/json">
  {
    "url": {{ page.url | default: "/" | jsonify }},
    "tabTitle": {% if page.layout == 'home' %}"README.md"{% elsif page.layout == 'post' %}{{ page.title | truncate: 30 | append: ".md" | jsonify }}{% elsif page.layout == 'categories' %}"categories.md"{% elsif page.layout == 'tags' %}"tags.md"{% else %}{{ page.title | default: page.name | append: ".md" | jsonify }}{% endif %}
  }
  </script>
  <div class="vscode-app">
    {% include vscode/activity-bar.html %}
    {% include vscode/sidebar.html %}
    <div class="editor-group">
      {% include vscode/tabs.html %}
      {% include vscode/breadcrumb.html %}
      <div class="editor-content" id="editor-content">
        <div class="tab-panel active" data-tab-url="{{ page.url | default: '/' }}">
          <div class="editor-scroll">
            <div class="content-body">
              {{ content }}
            </div>
          </div>
        </div>
      </div>
    </div>
    {% include vscode/status-bar.html %}
  </div>
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴">
    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M16 5H0V4h16v1zm0 8H0v-1h16v1zm0-4.008H0V8h16v.992z"/></svg>
  </button>
  <div class="mobile-overlay" id="mobile-overlay"></div>
  <script src="/assets/js/vscode-blog.js"></script>
</body>
</html>
