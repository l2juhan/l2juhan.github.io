---
layout: default
---
<article class="post-content">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date | date: "%Y-%m-%d" }}</time>
      <span class="post-category">{{ page.categories | join: " / " }}</span>
    </div>
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}<span class="tag">#{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
