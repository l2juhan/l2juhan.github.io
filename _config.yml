# Site Settings
title                    : "잉주한의 IT 일기"
subtitle                 : "CS / Cloud / Frontend"
name                     : "이주한"
description              : "컴퓨터공학, 클라우드, 프론트엔드 학습 기록"
url                      : "https://l2juhan.github.io"
baseurl                  : ""
repository               : "l2juhan/l2juhan.github.io"

# Site Author
author:
  name     : "이주한"
  bio      : "인하대 컴공 / Cloud & Frontend"
  location : "Incheon, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/l2juhan"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/cse_juhan02"

# Reading Files
include:
  - _pages
encoding: "utf-8"

# Build settings
markdown: kramdown

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed

# Pagination
paginate: 5
paginate_path: /page:num/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      toc_sticky: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
