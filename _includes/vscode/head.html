<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: "Home" }} — {{ site.title }}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.36/dist/codicon.css">
<link rel="stylesheet" href="/assets/css/vscode-theme.css?v={{ site.time | date: '%s' }}">
<link rel="stylesheet" href="/assets/css/syntax.css?v={{ site.time | date: '%s' }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\(', right: '\\)', display: false}
    ]
  });"></script>
{% feed_meta %}
{% if site.goatcounter.code and site.goatcounter.code != "" %}
<script>
  window.GOATCOUNTER_CODE = {{ site.goatcounter.code | jsonify }};
  window.goatcounter = { no_onload: true };
</script>
<script data-goatcounter="https://{{ site.goatcounter.code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script defer src="/assets/js/views-counter.js?v={{ site.time | date: '%s' }}"></script>
{% endif %}
